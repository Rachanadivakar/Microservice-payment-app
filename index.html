<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <h1 class="main-title">💳 La'Marks Payment Service</h1>

  <h2>Payment</h2>

  <input type="text" id="name" placeholder="Cardholder Name">
  <input type="text" id="card" placeholder="Card Number">
  <input type="text" id="expiry" placeholder="MM/YY">
  <input type="password" id="cvv" placeholder="CVV">

  <button onclick="payNow()">Pay Now</button>

  <div class="success" id="successMsg">
    ✅ Payment Successful!
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
